name: Build automatizado github actionss

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write


jobs:
  code-quality-ppt:
    name: PPT Linting and Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run spotless check
        run: mvn -B -f ./pom.xml spotless:check

      - name: Run Checkstyle
        run: mvn -B -f ./pom.xml checkstyle:check

      - name: Generate Checkstyle report
        run: mvn -B -f ./pom.xml checkstyle:checkstyle

      - name: Run PMD check
        run: mvn -B -f ./pom.xml pmd:check

      - name: generate PMD report
        run: mvn -B -f ./pom.xml pmd:pmd
      
      - name: Run spotbugs check
        run: mvn -B -f ./pom.xml spotbugs:check

      - name: Generate SpotBugs report
        run: mvn -B -f ./pom.xml spotbugs:spotbugs
  
  test-ppt:
    needs: [code-quality-ppt]
    name: pedra/papel/tesoura Module Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
  
      - name: Roda os testes do módulo pedra/papel/tesoura
        run: mvn -B -f ./pom.xml clean package

      - name: Run E2E tests do módulo pedra/papel/tesoura
        run: mvn -B -f ./pom.xml -Ddocker.e2e=true -Dtest=PPTFlowE2ETest test

      - name: Run Code Quality Analysis do módulo pedra/papel/tesoura
        run: mvn -B -f ./pom.xml jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./target/site/jacoco/jacoco.xml
          flags: pedra_papel_tesoura
          name: PPT-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload Coverage Report do módulo PPT
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ./target/site/jacoco/
          retention-days: 1

  build-ppt:
    needs: [test-ppt]
    name: PPT Module Build and Artifact Upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build PPT module
        run: mvn -B -f ./pom.xml clean package -DskipTests
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ppt-jar
          path: ./target/*.jar
          retention-days: 1

  docker-ppt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set Docker Build
      uses: docker/setup-buildx-action@v3.12.0
    - name: Docker login
      uses: docker/login-action@v4.0.0
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWD }}
    - name: Docker push ppt-games
      uses: docker/build-push-action@v6.19.2
      with:
        file: ./Dockerfile
        context: ./
        push: true
        tags: leoalmeida/ppt-game:${{github.run_number}}